services:
  frontend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars must be passed as build args so Next.js can
        # inline them into the JS bundle at build time.
        # Backend runs on Brain 1 (this workstation)
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        REWRITE_BACKEND_URL: ${REWRITE_BACKEND_URL:-http://host.docker.internal:8300}
    ports:
      - "3300:3000"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8300:8300"
    environment:
      # --- Brain 2 (10.0.0.11) — app backends (permanent) ---
      KANBAN_API_URL: ${KANBAN_API_URL}
      TEAM_DASHBOARD_URL: ${TEAM_DASHBOARD_URL}
      QDRANT_URL: ${QDRANT_URL}
      FASTEMBED_URL: ${FASTEMBED_URL}
      POSTGRES_URL: ${POSTGRES_URL}
      # --- Brain 1 (10.0.0.1) — services awaiting migration to Brain 2 ---
      OPENCLAW_WS_URL: ${OPENCLAW_WS_URL}
      OPENCLAW_API_URL: ${OPENCLAW_API_URL}
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN}
      OPENCLAW_DEVICE_ID: ${OPENCLAW_DEVICE_ID}
      OPENCLAW_DEVICE_PUBLIC_KEY: ${OPENCLAW_DEVICE_PUBLIC_KEY}
      OPENCLAW_DEVICE_PRIVATE_KEY: ${OPENCLAW_DEVICE_PRIVATE_KEY}
      WHISPER_HOST: ${WHISPER_HOST}
      WHISPER_PORT: ${WHISPER_PORT}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD}
      MENTAL_LIBRARY_API_URL: ${MENTAL_LIBRARY_API_URL}
      LEADGEN_BACKEND_URL: ${LEADGEN_BACKEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      LEADGEN_DB_URL: ${LEADGEN_DB_URL}
      # Stripe
      STRIPE_LIVE_PK: ${STRIPE_LIVE_PK}
      STRIPE_LIVE_SK: ${STRIPE_LIVE_SK}
      STRIPE_TEST_PK: ${STRIPE_TEST_PK}
      STRIPE_TEST_SK: ${STRIPE_TEST_SK}
      STRIPE_MODE: ${STRIPE_MODE:-test}
      # Resend
      RESEND_API_KEY: ${RESEND_API_KEY}
      # Anthropic (for deep audit AI analysis)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # SQLite read-only mount from the mental-library skill volume
      MENTAL_LIBRARY_DB: ${MENTAL_LIBRARY_DB:-/data/mental-library/mental_library.db}
    restart: unless-stopped
    network_mode: host
    volumes:
      - /home/eddy/.openclaw/workspace/skills/mental-library/backend/data:/data/mental-library:ro
      - /home/eddy/.openclaw/workspace/skills/voice-io/scripts:/voice-io-scripts:ro
      - /home/eddy/.openclaw/agents/main/sessions:/openclaw-sessions:ro
      - instagram-cookies:/data
      - /tmp/warroom-transcribe:/tmp/warroom-transcribe
      - /home/eddy/.openclaw:/openclaw:rw
      - /home/eddy/.openclaw/workspace:/openclaw-workspace:rw
      - /home/eddy/.npm-global/lib/node_modules/openclaw/skills:/openclaw-bundled-skills:ro


  worker:
    build: ./backend
    command: arq app.services.workflow_queue.WorkerSettings
    network_mode: host
    depends_on:
      - backend
    environment:
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379/2}
      POSTGRES_URL: ${POSTGRES_URL}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped
    volumes:
      - /home/eddy/.openclaw/workspace/skills/mental-library/backend/data:/data/mental-library:ro

  warroom-qdrant:
    image: qdrant/qdrant:latest
    container_name: warroom-qdrant
    ports:
      - "6334:6333"  # Use 6334 to avoid conflict with Brain 2's 6333
    volumes:
      - warroom-qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  instagram-cookies:
  warroom-qdrant-data:
